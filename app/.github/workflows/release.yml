name: "Release"
on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
            
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout Frontend
        uses: actions/checkout@v4
        with:
          path: SAELABEL.App

      - name: Checkout Backend
        uses: actions/checkout@v4
        with:
          repository: EskenderDev/SAE.STUDIO
          path: SAE.STUDIO

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies (Node)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        working-directory: ./SAELABEL.App
        run: npm install

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './SAELABEL.App/src-tauri -> target'

      - name: Build Full Package (Inno Setup)
        working-directory: ./SAELABEL.App
        run: |
          # The orchestrator handles API build, Tauri build, and Inno Setup
          pwsh ./scripts/build_full_package.ps1

      - name: Get Version
        id: get_version
        working-directory: ./SAELABEL.App
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            SAELABEL.App/scripts/Output/SAE_Studio_Setup_v${{ steps.get_version.outputs.VERSION }}.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
